<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --bg2: #101010; --bg3: #181818;
    --border: #222; --border2: #333;
    --text: #e2e2e2; --muted: #555; --muted2: #888;
    --accent: #00e87a; --accent2: #3b9eff; --accent3: #ff6b35;
    --mono: 'JetBrains Mono', monospace; --display: 'Syne', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--mono); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.7; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  
  /* FIXED NAV - Removed initial transform for safety while debugging */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 5vw; background: rgba(8,8,8,0.9); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: var(--display); font-weight: 800; font-size: 17px; color: var(--accent); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { color: var(--muted2); font-size: 11px; text-transform: uppercase; }
  .nav-cta { padding: 0.5rem 1.2rem; border: 1px solid var(--accent); color: var(--accent) !important; }

  /* HERO SECTION */
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 5vw; }
  .hero { min-height: 100vh; display: flex; align-items: center; padding: 7rem 5vw 5rem; border-bottom: 1px solid var(--border); position: relative; }
  .hero-inner { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 5rem; width: 100%; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.25rem 0.75rem; background: rgba(0,232,122,0.08); border: 1px solid rgba(0,232,122,0.2); color: var(--accent); font-size: 11px; border-radius: 2px; }
  .hero-name { font-family: var(--display); font-size: clamp(52px, 6.5vw, 86px); font-weight: 800; line-height: 0.92; color: var(--text); margin-bottom: 1.8rem; }
  .hero-name .accent { color: var(--accent); }
  
  /* TERMINAL */
  .terminal { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .term-bar { background: var(--bg3); padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.4rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .term-body { padding: 1.25rem 1.5rem; font-size: 12.5px; line-height: 2; }
  .tk { color: var(--accent2); } .ts { color: #e09160; } .tv { color: var(--accent); }

  /* ... (Rest of your styles below) ... */
